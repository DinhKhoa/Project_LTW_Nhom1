{% extends 'base.html' %}
{% load static %}

{% block title %}Nhiệm vụ Đơn hàng {{ order.order_code }} - Nhân viên{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/components/order_info.css' %}">

<section class="order-view-page">
    <a href="{% url 'tasks:task_list' %}" class="back-link">
        <i class="fa fa-angle-left"></i> Về Danh sách Nhiệm vụ
    </a>

    {% include 'components/_order_info.html' with view_type='staff' %}

    <!-- Toast Notification -->
    <div class="toast" id="orderToast" style="position: fixed; top: 24px; right: 24px; background: #0f8b52; color: #fff; padding: 16px 20px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.18); opacity: 0; transform: translateY(-10px); pointer-events: none; transition: 0.25s; z-index: 9999;"></div>
</section>

<script src="{% static 'orders/js/order_detail.js' %}"></script>
{% endblock %}
