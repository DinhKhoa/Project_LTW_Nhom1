{% extends 'base.html' %}

{% block title %}Xóa địa chỉ - DAHUKA{% endblock %}

{% block content %}
<style>
    .confirm-page {
        background: #d8cfcd;
        padding: 40px 16px;
        min-height: calc(100vh - 160px);
    }

    .confirm-card {
        width: min(720px, 100%);
        margin: 0 auto;
        background: #fff;
        border: 1px solid #9da3ad;
        padding: 42px 28px 32px;
        text-align: center;
    }

    .confirm-card h1 {
        margin: 0 0 28px;
        font-size: 28px;
        color: #6b7280;
        font-weight: 500;
    }

    .confirm-actions {
        display: flex;
        justify-content: center;
        gap: 22px;
        margin-top: 26px;
    }
</style>

<section class="confirm-page">
    <div class="confirm-card">
        <h1>Bạn có chắc chắn muốn xóa địa chỉ?</h1>
        <div style="color: #7b8491; font-size: 14px;">
            {{ address.full_name }} - {{ address.address_detail }}, {{ address.ward }}, {{ address.district }}, {{ address.province }}
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="confirm-actions">
                <a href="{% url 'address_list' %}" class="account-btn-dark">Hủy</a>
                <button type="submit" class="account-btn-outline">Xác nhận</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
