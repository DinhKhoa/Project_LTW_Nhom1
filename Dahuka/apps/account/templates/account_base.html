{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    .account-page {
        background: #fff;
        padding: 10px 0 64px;
    }

    .account-shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        display: grid;
        grid-template-columns: 240px 1fr;
        gap: 18px;
        align-items: start;
    }

    .account-sidebar {
        border-right: 1px solid #f0f0f0;
        min-height: 580px;
        padding-right: 18px;
    }

    .account-user {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 18px 12px;
        border-bottom: 1px solid #f3f3f3;
        margin-bottom: 18px;
    }

    .account-user-avatar {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: #edf1f7;
        color: #95a0b3;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
    }

    .account-user-meta {
        color: #9aa1ac;
        font-size: 12px;
        line-height: 1.35;
    }

    .account-user-name {
        color: #2b3340;
        font-size: 15px;
        font-weight: 700;
    }

    .account-menu {
        display: grid;
        gap: 8px;
    }

    .account-menu a {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-radius: 0;
        color: #808a98;
        text-decoration: none;
        font-size: 14px;
        transition: background-color .2s ease, color .2s ease;
    }

    .account-menu a:hover {
        background: #111827;
        color: #fff;
    }

    .account-menu a.active {
        background: #fdf0f5;
        color: #cf6e95;
        font-weight: 600;
    }

    .account-main {
        min-height: 580px;
    }

    .account-heading {
        font-size: 24px;
        font-weight: 500;
        color: #5e6775;
        margin: 10px 0 18px;
    }

    .account-card {
        background: #fff;
        border: 1px solid #f1f1f1;
        border-radius: 0;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.05);
    }

    .account-field,
    .account-select,
    .account-textarea {
        width: 100%;
        border: 1px solid #e8ecf2;
        border-radius: 0;
        padding: 10px 14px;
        font-size: 14px;
        color: #4a5565;
        background: #fff;
    }

    .account-textarea {
        resize: vertical;
        min-height: 92px;
    }

    .account-field:focus,
    .account-select:focus,
    .account-textarea:focus {
        outline: none;
        border-color: #88aef7;
        box-shadow: 0 0 0 2px rgba(136, 174, 247, 0.15);
    }

    .account-label {
        font-size: 14px;
        color: #7a808a;
        margin-bottom: 8px;
        display: block;
    }

    .account-errors,
    .errorlist {
        list-style: none;
        padding: 0;
        margin: 6px 0 0;
        color: #d15555;
        font-size: 12px;
    }

    @media (max-width: 900px) {
        .account-shell {
            grid-template-columns: 1fr;
        }

        .account-sidebar {
            min-height: auto;
            border-right: 0;
            border-bottom: 1px solid #f0f0f0;
            padding-right: 0;
            padding-bottom: 18px;
        }
    }
</style>

<section class="account-page">
    <div class="account-shell">
        <aside class="account-sidebar">
            <div class="account-user">
                <div class="account-user-avatar">
                    <i class="fa fa-user-o"></i>
                </div>
                <div>
                    <div class="account-user-meta">Tài khoản của</div>
                    <div class="account-user-name">{{ user.get_full_name|default:user.username }}</div>
                </div>
            </div>

            <nav class="account-menu">
                <a href="{% url 'profile_view' %}" class="{% if active_section == 'profile' %}active{% endif %}">
                    <i class="fa fa-user-o"></i>
                    <span>Thông tin tài khoản</span>
                </a>
                {% if not user.is_staff %}
                <a href="{% url 'address_list' %}" class="{% if active_section == 'addresses' %}active{% endif %}">
                    <i class="fa fa-map-marker"></i>
                    <span>Sổ địa chỉ</span>
                </a>
                <a href="{% url 'order_list' %}" class="{% if active_section == 'orders' %}active{% endif %}">
                    <i class="fa fa-shopping-bag"></i>
                    <span>Quản lý đơn hàng</span>
                </a>
                {% endif %}
            </nav>
        </aside>

        <main class="account-main">
            {% block account_body %}{% endblock %}
        </main>
    </div>
</section>
{% endblock %}
