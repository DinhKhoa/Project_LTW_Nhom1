{% extends 'base.html' %}

{% block title %}Đăng nhập - DAHUKA{% endblock %}

{% block content %}
{% load static %}
<link rel="stylesheet" href="{% static 'css/auth-forms.css' %}">

<section class="login-page">
    <!-- Form đăng nhập — gửi POST đến /accounts/login/ (Django built-in LoginView xử lý) -->
    <form method="post" class="login-card" style="width: min(420px, 100%);">
        {% csrf_token %} <!-- Token bảo mật chống tấn công CSRF, bắt buộc với mọi form POST -->
        <h1>Đăng nhập tài khoản</h1>

        <!-- Hiển thị lỗi nếu sai SĐT hoặc mật khẩu (do Django LoginView trả về) -->
        {% if form.non_field_errors %}
            <div class="login-message error">{{ form.non_field_errors }}</div>
        {% endif %}

        <!-- Label "Số điện thoại" nhưng name="username" — vì SĐT được lưu làm username -->
        <label for="id_username">Số điện thoại</label>
        <input type="text" id="id_username" name="username" required autofocus>

        <label for="id_password">Mật khẩu</label>
        <input type="password" id="id_password" name="password" required>

        <!-- Submit form → Django authenticate(username=SĐT, password=...) → tạo session -->
        <button type="submit" class="btn-minimal" style="width: 100%;">Đăng nhập</button>

        <!-- Link chuyển sang trang đăng ký -->
        <div style="text-align: center; margin-top: 24px; font-size: 14px; color: #6b7280;">
            Bạn chưa có tài khoản? <a href="{% url 'account:signup' %}" style="color: var(--brand, #0B6E4F); text-decoration: none; font-weight: 600;">Đăng ký</a>
        </div>

        <!-- Link chuyển đến trang đổi mật khẩu (không cần đăng nhập) -->
        <div style="text-align: right; margin-top: 12px;">
            <a href="{% url 'account:public_change_password' %}" style="color: var(--brand, #0B6E4F); font-size: 13px; text-decoration: none; font-weight: 500;">Đổi mật khẩu?</a>
        </div>
    </form>
</section>
{% endblock %}
